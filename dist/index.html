<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoTrack — Carbon Footprint Tracker & Reduction Platform</title>
  <meta name="description" content="Calculate, monitor, and reduce your carbon footprint with personalized recommendations, goal setting, gamification, and progress tracking." />
  <meta name="keywords" content="carbon footprint, sustainability, eco tracker, CO2 reduction, green living" />
  <meta name="theme-color" content="#0a1628" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* Prevent scrollbars from the bubbles */
    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background-color: #0a1628; /* Your theme color */
    }

    /* The container for the background */
    .bubbles-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100000; /* Keeps bubbles behind your app */
      pointer-events: none; /* Prevents bubbles from blocking clicks */
    }

    /* Basic bubble styling */
    .bubble {
      position: absolute;
      bottom: -100px;
      background-color: rgba(255, 255, 255, 0.1); /* Semi-transparent white */
      border-radius: 50%;
      animation: floatUp 10s infinite ease-in;
    }

    /* Individual bubble sizes, positions, and speeds */
    .bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 8s; }
    .bubble:nth-child(2) { width: 20px; height: 20px; left: 20%; animation-duration: 5s; animation-delay: 1s; }
    .bubble:nth-child(3) { width: 50px; height: 50px; left: 35%; animation-duration: 7s; animation-delay: 2s; }
    .bubble:nth-child(4) { width: 80px; height: 80px; left: 50%; animation-duration: 11s; animation-delay: 0s; }
    .bubble:nth-child(5) { width: 35px; height: 35px; left: 65%; animation-duration: 6s; animation-delay: 3s; }
    .bubble:nth-child(6) { width: 60px; height: 60px; left: 80%; animation-duration: 9s; animation-delay: 1s; }
    .bubble:nth-child(7) { width: 25px; height: 25px; left: 90%; animation-duration: 4s; animation-delay: 2s; }

    /* The animation logic moving them upward */
    @keyframes floatUp {
      0% { 
        transform: translateY(0); 
        opacity: 0; 
      }
      50% { 
        opacity: 1; 
      }
      100% { 
        transform: translateY(-120vh); /* Moves them past the top of the screen */
        opacity: 0; 
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-Ced5dkur.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CMWxZe6t.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
